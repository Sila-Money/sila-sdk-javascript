name: Release to npm

on:
  push:
    branches: [ master ]

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Bump version to')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_WORKFLOW }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Bump patch version
        id: bump_version
        run: |
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "Bump version to ${{ steps.bump_version.outputs.new_version }}"
          git push origin master

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_WORKFLOW }}
        run: |
          gh release create "${{ steps.bump_version.outputs.new_version }}" \
            --title "${{ steps.bump_version.outputs.new_version }}" \
            --generate-notes \
            --target master

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Clear GPG keys
        if: always()
        run: gpg --batch --yes --delete-secret-and-public-keys \
          $(gpg --list-secret-keys --keyid-format LONG \
            | grep sec | awk '{print $2}' | cut -d'/' -f2) || true
            